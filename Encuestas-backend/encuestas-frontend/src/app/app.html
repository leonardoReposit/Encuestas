<nav class="navbar">
  <div class="nav-inner">
    <a routerLink="/" class="brand">📋 EncuestasApp</a>
    <div class="nav-links">
      @if (isLoggedIn) {
        <span class="user-info">
          <span class="user-name">{{ nombre }}</span>
          <span class="rol-badge" [class.admin]="isAdmin">{{ isAdmin ? 'Admin' : 'Usuario' }}</span>
        </span>
        @if (isAdmin) {
          <a routerLink="/encuestas/nueva" class="btn-nav">+ Nueva Encuesta</a>
        }
        <a href="#" (click)="logout(); $event.preventDefault()" class="btn-nav logout">Cerrar sesión</a>
      } @else {
        <a routerLink="/login" class="btn-nav">Iniciar sesión</a>
        <a routerLink="/register" class="btn-nav register">Registrarse</a>
      }
    </div>
  </div>
</nav>

<main class="main-content">
  <router-outlet />
</main>
