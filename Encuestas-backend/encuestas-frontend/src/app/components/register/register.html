<div class="auth-container">
  <div class="auth-card">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Regístrate para empezar a votar</p>
    <form (ngSubmit)="register()">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      <button type="submit" class="btn-primary">Registrarse</button>
      <p class="link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </form>
  </div>
</div>
