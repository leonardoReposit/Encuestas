<div class="auth-container">
  <div class="auth-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Ingresa tus credenciales para acceder</p>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      <button type="submit" class="btn-primary">Ingresar</button>
      <p class="link">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </form>
  </div>
</div>
